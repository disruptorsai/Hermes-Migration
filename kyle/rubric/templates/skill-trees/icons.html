function drawIcon(canvas, pixels, color) {
  const ctx = canvas.getContext('2d');
  const g = 8, px = 14;
  canvas.width = g * px;
  canvas.height = g * px;
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let y = 0; y < pixels.length; y++) {
    for (let x = 0; x < pixels[y].length; x++) {
      if (pixels[y][x]) {
        ctx.fillStyle = color;
        ctx.fillRect(x * px, y * px, px, px);
        ctx.fillRect((g - 1 - x) * px, y * px, px, px);
      }
    }
  }
}

function showToast(name) {
  const toast = document.getElementById('toast');
  toast.textContent = 'Copied: "' + name + '"';
  toast.style.display = 'block';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.style.display = 'none'; }, 1500);
}

function makeCard(d, idx) {
  const div = document.createElement('div');
  div.className = 'card';
  const c = document.createElement('canvas');
  c.style.width = idx === -1 ? '100px' : '80px';
  c.style.height = idx === -1 ? '100px' : '80px';
  c.style.imageRendering = 'pixelated';
  drawIcon(c, d.p, d.c);
  div.appendChild(c);
  div.innerHTML += '<div class="name" style="color:' + d.c + '">' + d.n + '</div>' +
    (idx >= 0 ? '<div class="idx">#' + (idx + 1) + '</div>' : '<div class="idx">The Original</div>');
  div.insertBefore(c, div.firstChild);
  div.addEventListener('click', () => {
    navigator.clipboard.writeText(d.n).then(() => {
      div.classList.add('copied');
      showToast(d.n);
      setTimeout(() => div.classList.remove('copied'), 1500);
    });
  });
  return div;
}
